<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Talks Event Schedule</title>
    <style id="main-css"></style>
</head>
<body>
    <header>
        <h1>1-Day Technical Talks Event</h1>
        <p>Your guide to an exciting day of tech insights.</p>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="categorySearch" placeholder="Search by category (e.g., AI/ML)">
            <button id="searchButton">Search</button>
            <button id="clearSearchButton">Clear</button>
        </section>

        <section class="schedule-section">
            <h2>Event Schedule</h2>
            <div id="scheduleContainer" class="schedule-grid">
                <!-- Talks will be loaded here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Technical Talks Event</p>
    </footer>

    <script id="talks-data"></script>
    <script id="main-script"></script>
</body>
</html>
